<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TRACER — Golf Shot Tracer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --border:#222;
    --green:#00e676; --green-dim:rgba(0,230,118,0.12);
    --red:#ff4444; --blue:#4488ff; --yellow:#ffd700;
    --text:#fff; --muted:#666;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }
  #root { min-height:100vh; }

  .header {
    position:fixed; top:0; left:0; right:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(16px + env(safe-area-inset-top,0)) 20px 16px;
    background:rgba(10,10,10,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .logo { font-family:'Bebas Neue'; font-size:26px; letter-spacing:4px; color:var(--green); }
  .logo span { color:var(--muted); }
  .header-badge {
    font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    background:var(--green-dim); color:var(--green); border:1px solid rgba(0,230,118,0.3);
    padding:4px 10px; border-radius:20px;
  }
  .screen { padding-top:74px; min-height:100vh; padding-bottom:40px; }

  .upload-zone {
    margin:20px; border:2px dashed var(--border); border-radius:16px;
    padding:50px 20px; text-align:center; transition:all 0.2s;
    background:var(--surface); position:relative; overflow:hidden;
  }
  .upload-zone.drag-over { border-color:var(--green); background:var(--green-dim); }
  .upload-icon {
    width:64px; height:64px; margin:0 auto 16px; background:var(--green-dim);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:1px solid rgba(0,230,118,0.3);
  }
  .upload-icon svg { width:28px; height:28px; stroke:var(--green); }
  .upload-title { font-family:'Bebas Neue'; font-size:24px; letter-spacing:3px; margin-bottom:8px; }
  .upload-sub { color:var(--muted); font-size:13px; line-height:1.6; }
  .upload-btn {
    margin-top:20px; padding:14px 32px; background:var(--green); color:#000;
    font-family:'Bebas Neue'; font-size:18px; letter-spacing:3px;
    border:none; border-radius:10px; cursor:pointer; transition:transform 0.1s;
  }
  .upload-btn:active { transform:scale(0.96); }

  .tips { margin:0 20px 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .tip-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .tip-icon { font-size:20px; margin-bottom:6px; }
  .tip-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--green); margin-bottom:4px; }
  .tip-text { font-size:12px; color:var(--muted); line-height:1.5; }

  .video-container { margin:20px; border-radius:16px; overflow:hidden; background:#000; position:relative; border:1px solid var(--border); }
  video { width:100%; display:block; }
  canvas { display:block; }
  .video-overlay-canvas {
    position:absolute; top:0; left:0;
    /* JS will set exact pixel position to match letterboxed video frame */
  }
  .video-loading-shade {
    position:absolute; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center; gap:8px;
    color:var(--green); font-family:'Bebas Neue'; letter-spacing:3px; font-size:13px;
    padding:8px; pointer-events:none;
  }

  .controls { margin:0 20px; display:flex; flex-direction:column; gap:12px; }
  .btn {
    width:100%; padding:16px; border:none; border-radius:12px;
    font-family:'Bebas Neue'; font-size:20px; letter-spacing:3px;
    cursor:pointer; transition:transform 0.1s;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }
  .btn:active { transform:scale(0.97); }
  .btn-primary { background:var(--green); color:#000; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-danger { background:rgba(255,68,68,0.1); color:var(--red); border:1px solid rgba(255,68,68,0.3); }
  .btn:disabled { opacity:0.4; pointer-events:none; }

  .analyzing-overlay {
    position:fixed; inset:0; background:rgba(10,10,10,0.96);
    z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:30px 20px;
  }
  .analyzing-title { font-family:'Bebas Neue'; font-size:32px; letter-spacing:4px; margin-bottom:12px; }
  .analyzing-sub { color:var(--muted); font-size:13px; text-align:center; margin-bottom:30px; }
  .progress-ring { width:140px; height:140px; margin-bottom:24px; position:relative; }
  .progress-ring svg { transform:rotate(-90deg); }
  .progress-ring-bg { stroke:var(--border); }
  .progress-ring-fg { stroke:var(--green); transition:stroke-dashoffset 0.4s ease; }
  .progress-pct {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Bebas Neue'; font-size:38px; color:var(--green); letter-spacing:2px;
  }
  .status-msg { font-size:14px; color:var(--text); margin-bottom:16px; text-align:center; min-height:20px; }
  .step-list { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .step-pill { font-size:11px; padding:5px 11px; border-radius:20px; background:var(--border); color:var(--muted); }
  .step-pill.active { background:var(--green-dim); color:var(--green); border:1px solid rgba(0,230,118,0.3); }
  .step-pill.done { background:#1a2e1a; color:#4caf50; }

  .settings-panel { margin:0 20px 20px; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .settings-header { padding:14px 16px; border-bottom:1px solid var(--border); font-family:'Bebas Neue'; font-size:16px; letter-spacing:2px; color:var(--green); }
  .settings-row { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .settings-row:last-child { border-bottom:none; }
  .setting-label { font-size:13px; font-weight:500; }
  .setting-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .color-swatches { display:flex; gap:8px; }
  .swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.1s; }
  .swatch.selected { border-color:#fff; transform:scale(1.15); }
  .slider { -webkit-appearance:none; appearance:none; width:120px; height:4px; border-radius:2px; background:var(--border); outline:none; }
  .slider::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--green); cursor:pointer; }
  select { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:13px; outline:none; }

  .results-section { margin:0 20px 20px; }
  .section-title { font-family:'Bebas Neue'; font-size:20px; letter-spacing:3px; margin-bottom:12px; color:var(--green); }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .stat-value { font-family:'Bebas Neue'; font-size:28px; color:var(--green); }
  .stat-unit { font-size:11px; color:var(--muted); }
  .stat-label { font-size:12px; color:var(--muted); margin-top:2px; }

  .export-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
  .export-row { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
  .export-row:last-child { border-bottom:none; }
  .export-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .export-info { flex:1; }
  .export-name { font-size:14px; font-weight:600; }
  .export-desc { font-size:12px; color:var(--muted); margin-top:2px; }
  .export-btn { padding:8px 16px; border-radius:8px; font-family:'Bebas Neue'; font-size:14px; letter-spacing:2px; cursor:pointer; border:none; transition:transform 0.1s; }
  .export-btn:active { transform:scale(0.95); }
  .export-btn-green { background:var(--green); color:#000; }
  .export-btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }

  .toast {
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:12px 20px; font-size:13px; display:flex; align-items:center; gap:8px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:999; max-width:90vw;
    animation:slideUp 0.3s ease;
  }
  .toast.success { border-color:rgba(0,230,118,0.4); color:var(--green); }
  .toast.error { border-color:rgba(255,68,68,0.4); color:var(--red); }
  @keyframes slideUp { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

  .errbox { margin:80px 20px 20px; background:var(--surface); border:1px solid rgba(255,68,68,0.4); border-radius:14px; padding:20px; }
  .errbox h2 { font-family:'Bebas Neue'; letter-spacing:2px; color:var(--red); font-size:22px; margin-bottom:10px; }
  .errbox pre { font-size:12px; color:var(--muted); white-space:pre-wrap; word-break:break-word; background:#000; padding:12px; border-radius:8px; margin-top:10px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const { useState, useEffect, useRef, useCallback } = React;
const e = React.createElement;

const TRACER_COLORS = [
  { hex:'#00e676' },{ hex:'#ffffff' },{ hex:'#ffd700' },
  { hex:'#ff4444' },{ hex:'#4488ff' },{ hex:'#ff8c00' }
];
const TRACER_STYLES = ['Glowing','Smooth Arc','Dotted','TV Classic'];

function formatTime(sec) {
  if (!isFinite(sec)) return '0:00';
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return m + ':' + String(s).padStart(2,'0');
}

function drawTracer(canvas, points, settings, videoW, videoH, animProgress) {
  if (!canvas || !points || points.length<2) return;
  if (animProgress===undefined) animProgress=1;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const sx=canvas.width/videoW, sy=canvas.height/videoH;
  const scaled=points.map(p=>({x:p.x*sx,y:p.y*sy}));
  const n=Math.max(2,Math.round(scaled.length*animProgress));
  const visible=scaled.slice(0,n);
  const color=settings.color, lw=settings.lineWidth, style=settings.tracerStyle;

  if (style==='Glowing') {
    [0.15,0.3,0.6,1].forEach((a,i)=>{
      ctx.save();
      ctx.globalAlpha=a; ctx.strokeStyle=color;
      ctx.lineWidth=lw*(4-i)*0.8; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.shadowColor=color; ctx.shadowBlur=20-i*4;
      ctx.beginPath();
      visible.forEach((p,j)=>j===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
      ctx.stroke(); ctx.restore();
    });
  } else if (style==='Dotted') {
    visible.forEach((p,j)=>{
      if (j===0) return;
      ctx.beginPath();
      ctx.arc(p.x,p.y, j===visible.length-1?lw*2.5:lw*1.2, 0, Math.PI*2);
      ctx.fillStyle=color; ctx.globalAlpha=0.3+(j/visible.length)*0.7; ctx.fill();
    });
    ctx.globalAlpha=1;
  } else {
    ctx.save();
    ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round';
    if (style==='TV Classic') ctx.setLineDash([lw*2,lw*1.5]);
    const a=visible[0], b=visible[visible.length-1];
    const g=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    g.addColorStop(0,color+'44'); g.addColorStop(0.5,color+'cc'); g.addColorStop(1,color);
    ctx.strokeStyle=g; ctx.beginPath();
    if (visible.length>=3) {
      ctx.moveTo(visible[0].x,visible[0].y);
      for (let i=1;i<visible.length-1;i++){
        const mx=(visible[i].x+visible[i+1].x)/2, my=(visible[i].y+visible[i+1].y)/2;
        ctx.quadraticCurveTo(visible[i].x,visible[i].y,mx,my);
      }
      ctx.lineTo(b.x,b.y);
    } else { ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); }
    ctx.stroke(); ctx.restore();
  }
  if (visible.length>0 && animProgress>0.05) {
    const s=visible[0];
    ctx.beginPath(); ctx.arc(s.x,s.y,lw*2.5,0,Math.PI*2);
    ctx.fillStyle=color; ctx.globalAlpha=0.9; ctx.fill(); ctx.globalAlpha=1;
  }
  if (visible.length>1) {
    const last=visible[visible.length-1];
    ctx.beginPath(); ctx.arc(last.x,last.y,lw*3,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.globalAlpha=0.9; ctx.fill(); ctx.globalAlpha=1;
  }
}

class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  render(){
    if (this.state.err) {
      return e('div',{className:'errbox'},
        e('h2',null,'Something broke'),
        e('pre',null,String(this.state.err.message||this.state.err)),
        e('button',{className:'btn btn-primary',style:{marginTop:16},onClick:()=>location.reload()},'RELOAD')
      );
    }
    return this.props.children;
  }
}

function App() {
  const [screen,setScreen] = useState('upload');
  const [videoUrl,setVideoUrl] = useState(null);
  const [videoFile,setVideoFile] = useState(null);
  const [isDragging,setIsDragging] = useState(false);
  const [progress,setProgress] = useState(0);
  const [statusMsg,setStatusMsg] = useState('');
  const [steps,setSteps] = useState([]);
  const [tracerPoints,setTracerPoints] = useState(null);
  const [videoMeta,setVideoMeta] = useState(null);
  const [videoLoading,setVideoLoading] = useState(false);
  const [settings,setSettings] = useState({ color:'#00e676', lineWidth:3, tracerStyle:'Glowing' });
  const [stats,setStats] = useState(null);
  const [toast,setToast] = useState(null);
  const [manualMode,setManualMode] = useState(false);
  const [manualPoints,setManualPoints] = useState([]);
  const [exportProgress,setExportProgress] = useState(null);
  const [analyzing,setAnalyzing] = useState(false);

  const videoRef = useRef(null);
  const overlayRef = useRef(null);
  const fileInputRef = useRef(null);
  const animRef = useRef(null);
  const settingsRef = useRef(settings);
  const pointsRef = useRef(null);
  const metaRef = useRef(null);
  const metadataPollRef = useRef(null);

  useEffect(()=>{ settingsRef.current=settings; },[settings]);
  useEffect(()=>{ pointsRef.current=tracerPoints; },[tracerPoints]);
  useEffect(()=>{ metaRef.current=videoMeta; },[videoMeta]);

  // Reposition canvas on resize/orientation change
  useEffect(()=>{
    const onResize=()=>{ if(metaRef.current) positionCanvas(); };
    window.addEventListener('resize',onResize);
    return ()=>window.removeEventListener('resize',onResize);
  },[positionCanvas]);

  const showToast = (msg,type)=>{
    setToast({msg,type:type||'success'});
    setTimeout(()=>setToast(null),3500);
  };

  // ── Set up metadata on a freshly mounted video ──
  const setMetaFromVideo = ()=>{
    const v=videoRef.current;
    if (!v) return false;
    if (v.videoWidth>0 && v.videoHeight>0) {
      let dur=v.duration;
      if (!isFinite(dur) || dur<=0) dur=4;
      const meta = { width:v.videoWidth, height:v.videoHeight, duration:dur };
      setVideoMeta(meta); metaRef.current=meta;
      try { v.muted=false; } catch(_){}
      setVideoLoading(false);
      // Position canvas after a brief layout settle
      setTimeout(positionCanvas, 80);
      return true;
    }
    return false;
  };

  // ── Poll for metadata in case events don't fire (iOS quirk) ──
  useEffect(()=>{
    if (!videoUrl) return;
    setVideoLoading(true);
    if (metadataPollRef.current) clearInterval(metadataPollRef.current);
    metadataPollRef.current = setInterval(()=>{
      if (setMetaFromVideo()) {
        clearInterval(metadataPollRef.current);
        metadataPollRef.current=null;
      }
    },200);
    // safety: try to force a load on the video element
    setTimeout(()=>{
      const v=videoRef.current;
      if (v && typeof v.load==='function') {
        try { v.load(); } catch(_){}
      }
    },100);
    return ()=>{ if(metadataPollRef.current){ clearInterval(metadataPollRef.current); metadataPollRef.current=null; } };
  },[videoUrl]);

  const handleFile = (file)=>{
    if (!file || !file.type.startsWith('video/')) { showToast('Please upload a video file','error'); return; }
    setVideoFile(file);
    const url=URL.createObjectURL(file);
    setVideoUrl(url);
    setTracerPoints(null); setStats(null); pointsRef.current=null;
    setManualPoints([]); setManualMode(false);
    setVideoMeta(null); metaRef.current=null;
    setScreen('preview');
  };

  // Animation loop (continuous render of tracer while video plays)
  useEffect(()=>{
    let fc=0;
    function loop(){
      const v=videoRef.current, c=overlayRef.current, pts=pointsRef.current, meta=metaRef.current;
      // Reposition canvas every 60 frames to stay aligned after any layout shift
      if (fc%60===0 && meta && v && v.videoWidth) positionCanvas();
      fc++;
      if (c && meta && pts && pts.length>=2 && !manualMode) {
        if (!c.width||!c.height||c.width!==meta.width||c.height!==meta.height){ c.width=meta.width; c.height=meta.height; }
        const cf=(v&&v.currentTime||0)*30;
        const f0=pts[0].frame||0, f1=pts[pts.length-1].frame||0;
        const prog=f1>f0?Math.max(0,Math.min(1,(cf-f0)/(f1-f0+10))):1;
        drawTracer(c,pts,settingsRef.current,meta.width,meta.height,prog);
      } else if (c && manualMode && !manualPoints.length) {
        c.getContext('2d').clearRect(0,0,c.width,c.height);
      }
      animRef.current=requestAnimationFrame(loop);
    }
    animRef.current=requestAnimationFrame(loop);
    return ()=>{ if(animRef.current) cancelAnimationFrame(animRef.current); };
  },[manualMode, manualPoints.length, positionCanvas]);

  useEffect(()=>{
    if (tracerPoints && overlayRef.current && videoMeta && !manualMode) {
      drawTracer(overlayRef.current, tracerPoints, settings, videoMeta.width, videoMeta.height, 1);
    }
  },[settings]);

  // ── Wait for video to actually be ready ──
  const ensureReady = async ()=>{
    const v=videoRef.current;
    if (!v) throw new Error('Video element missing');
    if (setMetaFromVideo()) return;
    // We're inside a user gesture (button tap) — use it to force iOS to load.
    try { v.muted=true; v.load(); } catch(_){}
    try {
      const p=v.play();
      if (p && p.then) await p.catch(()=>{});
      // let it buffer a moment, then pause
      await new Promise(r=>setTimeout(r,300));
      if (setMetaFromVideo()) { try{v.pause();}catch(_){}; return; }
      // nudge a seek to force dimension/duration resolution on stubborn blobs
      try { v.currentTime = 0.1; } catch(_){}
      await new Promise(r=>setTimeout(r,300));
      try { v.pause(); } catch(_){}
    } catch(_){}
    const t0=Date.now();
    while (Date.now()-t0 < 8000) {
      if (setMetaFromVideo()) return;
      await new Promise(r=>setTimeout(r,150));
    }
    const codes={1:'load aborted',2:'network error',3:'decode error',4:'format/codec not supported'};
    const me=v.error;
    const detail = me ? codes[me.code]||('code '+me.code)
                      : 'readyState='+v.readyState+' net='+v.networkState+' w='+v.videoWidth;
    throw new Error('Could not read video ('+detail+'). Tap the video ▶ first, or use Manual Trace.');
  };

  // ── Extract frames ──
  const extractFrames = (videoEl, count)=> new Promise((resolve,reject)=>{
    const frames=[]; const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d');
    canvas.width=Math.min(videoEl.videoWidth,640);
    canvas.height=Math.round(canvas.width*videoEl.videoHeight/videoEl.videoWidth);
    const dur=videoEl.duration||3; const win=Math.min(3,dur);
    const times=Array.from({length:count},(_,i)=>i*(win/count));
    let i=0; let timeout=null;
    const cap=()=>{
      if (i>=times.length){ resolve({frames, analyzeW:canvas.width, analyzeH:canvas.height}); return; }
      videoEl.currentTime=times[i];
      timeout=setTimeout(()=>{ reject(new Error('Frame extraction timeout')); },5000);
      videoEl.onseeked=()=>{
        clearTimeout(timeout);
        try {
          ctx.drawImage(videoEl,0,0,canvas.width,canvas.height);
          frames.push({ time:times[i], frame:Math.round(times[i]*30), data:canvas.toDataURL('image/jpeg',0.7).split(',')[1] });
          i++; cap();
        } catch(err) { reject(err); }
      };
    };
    cap();
  });

  const findImpact = async (frames)=>{
    const content=[];
    frames.forEach((f,i)=>{
      content.push({type:'text',text:'Frame '+i+' (t='+f.time.toFixed(2)+'s):'});
      content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:f.data}});
    });
    content.push({type:'text',text:'Sequential frames from a golf swing. Find the frame index where the club makes contact with the ball. Reply ONLY with JSON: {"impactFrameIndex":0}'});
    const r=await fetch('/api/trace',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ max_tokens:200, messages:[{role:'user',content}] })
    });
    if (!r.ok) throw new Error('Vision API '+r.status);
    const d=await r.json();
    const t=(d.content&&d.content[0]&&d.content[0].text)||'{"impactFrameIndex":0}';
    try { return JSON.parse(t.replace(/```json|```/g,'').trim()); } catch { return {impactFrameIndex:0}; }
  };

  // ── Position canvas to match the actual rendered video frame (letterbox-aware) ──
  const positionCanvas = useCallback(()=>{
    const v=videoRef.current, c=overlayRef.current;
    if (!v || !c || !v.videoWidth) return;
    const containerW = v.clientWidth;
    const containerH = v.clientHeight;
    const vidRatio = v.videoWidth / v.videoHeight;
    const conRatio = containerW / containerH;
    let drawW, drawH, drawX, drawY;
    if (vidRatio > conRatio) {
      // letterbox top/bottom
      drawW = containerW;
      drawH = containerW / vidRatio;
      drawX = 0;
      drawY = (containerH - drawH) / 2;
    } else {
      // pillarbox left/right
      drawH = containerH;
      drawW = containerH * vidRatio;
      drawX = (containerW - drawW) / 2;
      drawY = 0;
    }
    c.style.left   = drawX + 'px';
    c.style.top    = drawY + 'px';
    c.style.width  = drawW + 'px';
    c.style.height = drawH + 'px';
    c.width  = v.videoWidth;
    c.height = v.videoHeight;
  }, []);

  // ── Fit a parabola to noisy AI points and return clean arc ──
  const fitParabola = (pts, meta) => {
    if (!pts || pts.length < 3) return pts;
    const W = meta.width, H = meta.height;

    // Find the leftmost & rightmost x to define arc span
    const xs = pts.map(p=>p.x);
    const minX = Math.min(...xs), maxX = Math.max(...xs);

    // Identify impact point: lowest y (highest on screen) among first third, or just first point
    // In golf, ball starts near golfer (usually lower-left), rises, then falls
    // Sort by x to get left-to-right order
    const sorted = [...pts].sort((a,b)=>a.x-b.x);

    const startPt = sorted[0];
    const endPt   = sorted[sorted.length-1];

    // Find apex: minimum y value (highest point on screen)
    const apexPt  = pts.reduce((best,p)=> p.y < best.y ? p : best, pts[0]);

    // Clamp everything to reasonable bounds
    const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const sx = clamp(startPt.x, 0, W);
    const sy = clamp(startPt.y, 0, H);
    const ex = clamp(endPt.x, 0, W);
    const ey = clamp(endPt.y, H*0.3, H);
    const ay = clamp(apexPt.y, H*0.05, H*0.7);
    // Apex x should be between start and end
    const ax = (sx + ex) / 2;

    // Generate 24 smooth parabola points using Bezier control point
    return Array.from({length:24}, (_,i)=>{
      const t = i/23;
      const x = sx + (ex-sx)*t;
      const y = (1-t)*(1-t)*sy + 2*(1-t)*t*ay + t*t*ey;
      return { frame: Math.round(t*60), x, y };
    });
  };

  const trackBall = async (frames, analyzeW, analyzeH)=>{
    const content=[];
    content.push({type:'text',text:[
      'You are analyzing a golf shot video. The frames are '+analyzeW+'x'+analyzeH+' pixels.',
      'Your task: find the golf ball in each frame and report its CENTER position as x,y pixel coordinates.',
      '',
      'CRITICAL RULES:',
      '- The golf ball is a small WHITE or LIGHT-COLORED circle, typically 10-30px diameter at this resolution.',
      '- The ball LAUNCHES from near the golfer (lower portion of frame) and flies in a PARABOLIC ARC.',
      '- x increases left-to-right. y increases top-to-bottom. The ball goes UP (y DECREASES) then DOWN (y INCREASES).',
      '- The ball NEVER goes backward (x should only increase, or only decrease, across frames).',
      '- If you cannot see the ball clearly in a frame, INTERPOLATE smoothly from neighboring frames.',
      '- DO NOT guess wildly. A smooth parabola is always better than erratic jumps.',
      '- The arc should start near the golfer and end far away at ground level.',
    ].join('\n')});

      content.push({type:'text',text:'=== FRAME '+i+' (t='+f.time.toFixed(2)+'s) ==='});
      content.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:f.data}});
    });

      '{"points":[{"frame":0,"x":150,"y":380},{"frame":2,"x":190,"y":310},...],"stats":{"estimatedCarryYards":180,"apexHeightFt":45,"ballFlightShape":"straight","shotType":"iron"}}',
      '',
      'The x values must be MONOTONICALLY INCREASING (or decreasing) — the ball only moves one direction.',
      'The y values must first DECREASE (ball going up) then INCREASE (ball coming down).',
      'Provide one point per frame, '+frames.length+' points total.',
    ].join('\n')});

      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ max_tokens:1500, messages:[{role:'user',content}] })
    });
    if (!r.ok) throw new Error('Vision API '+r.status);
    const d=await r.json();
    const t=(d.content&&d.content[0]&&d.content[0].text)||'';

    try { parsed=JSON.parse(t.replace(/```json|```/g,'').trim()); } catch { return null; }

    const sx=meta.width/analyzeW, sy=meta.height/analyzeH;
    let pts=(parsed.points||[]).map(p=>({ frame:p.frame||0, x:p.x*sx, y:p.y*sy }));

    // Fit a clean parabola to remove AI jitter/errors
    pts = fitParabola(pts, meta);

    return { points:pts, stats:parsed.stats||{} };
  };

    return {
      points:Array.from({length:20},(_,i)=>{
        const t=i/19;
        const x=sX+(eX-sX)*t;
        const y=(1-t)*(1-t)*sY+2*(1-t)*t*aY+t*t*eY;

        e('svg',{width:140,height:140},
          e('circle',{className:'progress-ring-bg',cx:70,cy:70,r:RING_R,fill:'none',strokeWidth:6}),
          e('circle',{className:'progress-ring-fg',cx:70,cy:70,r:RING_R,fill:'none',strokeWidth:6,strokeLinecap:'round',strokeDasharray:RING_C,strokeDashoffset:ringOffset})
        ),
        e('div',{className:'progress-pct'},progress+'%')
      ),
      e('div',{className:'status-msg'},statusMsg),
      e('div',{className:'step-list'},
        [{k:'extract',l:'Extract'},{k:'impact',l:'Impact'},{k:'track',l:'Track'},{k:'render',l:'Render'}].map(s=>
          e('span',{key:s.k,className:'step-pill'+(progress===100?' done':steps.indexOf(s.k)>=0?' active':'')},s.l))
      )
    ),

    toast && e('div',{className:'toast '+toast.type}, (toast.type==='success'?'✓ ':'✕ ')+toast.msg)
  );
}

window.addEventListener('error', function(ev){
  const root=document.getElementById('root');
  if (root && !root.hasChildNodes()) {
    root.innerHTML='<div class="errbox"><h2>Load error</h2><pre>'+(ev.message||'unknown')+'</pre></div>';
  }
});

ReactDOM.render(e(ErrorBoundary,null,e(App)), document.getElementById('root'));
</script>
</body>
</html>
