<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>TRACER</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0a0a0a; --surface:#111; --s2:#1a1a1a; --border:#222;
  --green:#00e676; --gdim:rgba(0,230,118,0.12); --red:#ff4444;
  --text:#fff; --muted:#666; --blue:#448aff;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }
#root { min-height:100dvh; }

.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top,0px)) 20px 14px;
  background:rgba(10,10,10,0.95); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}
.logo { font-family:'Bebas Neue'; font-size:26px; letter-spacing:5px; color:var(--green); }
.logo span { color:var(--muted); }
.badge {
  font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
  background:var(--gdim); color:var(--green); border:1px solid rgba(0,230,118,0.3);
  padding:4px 10px; border-radius:20px;
}
.screen { padding-top:72px; min-height:100dvh; padding-bottom:50px; }

/* ── Upload ── */
.drop-zone {
  border:2px dashed var(--border); border-radius:16px; padding:44px 20px;
  text-align:center; background:var(--surface); margin:20px;
  transition:border-color 0.2s, background 0.2s;
}
.drop-zone.over { border-color:var(--green); background:var(--gdim); }
.drop-icon {
  width:60px; height:60px; margin:0 auto 14px; border-radius:50%;
  background:var(--gdim); border:1px solid rgba(0,230,118,0.3);
  display:flex; align-items:center; justify-content:center;
}
.drop-icon svg { width:26px; height:26px; stroke:var(--green); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.drop-title { font-family:'Bebas Neue'; font-size:22px; letter-spacing:3px; margin-bottom:6px; }
.drop-sub { font-size:13px; color:var(--muted); line-height:1.5; }
.choose-btn {
  margin-top:18px; padding:13px 30px; background:var(--green); color:#000;
  font-family:'Bebas Neue'; font-size:17px; letter-spacing:3px;
  border:none; border-radius:10px; cursor:pointer;
}
.choose-btn:active { opacity:0.85; }
.tips-grid { margin:0 20px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.tip { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px; }
.tip-ic { font-size:18px; margin-bottom:5px; }
.tip-t { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--green); margin-bottom:3px; }
.tip-d { font-size:12px; color:var(--muted); line-height:1.45; }

/* ── Fullscreen mark mode ── */
.fs-topbar {
  position:absolute; top:0; left:0; right:0; z-index:12;
  padding:calc(14px + env(safe-area-inset-top,0px)) 16px 12px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
  display:flex; align-items:flex-start; gap:12px; pointer-events:none;
}
.fs-step-badge {
  background:var(--gdim); border:1px solid rgba(0,230,118,0.35);
  border-radius:20px; padding:5px 12px;
  font-family:'Bebas Neue'; font-size:13px; letter-spacing:2px; color:var(--green);
  white-space:nowrap;
}
.fs-instruct-title { font-size:15px; font-weight:700; line-height:1.2; }
.fs-instruct-sub { font-size:12px; color:rgba(255,255,255,0.65); margin-top:2px; }
.fs-stepdots {
  position:absolute; top:calc(env(safe-area-inset-top,0px) + 64px); left:0; right:0;
  display:flex; justify-content:center; gap:10px; z-index:12; pointer-events:none;
}
.fs-dot { width:9px; height:9px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); }
.fs-dot.done  { background:#4caf50; border-color:#4caf50; }
.fs-dot.active{ background:var(--green); border-color:var(--green); box-shadow:0 0 8px var(--green); }

.fs-bottom {
  position:absolute; bottom:0; left:0; right:0; z-index:12;
  background:linear-gradient(to top, rgba(0,0,0,0.92) 70%, transparent 100%);
  padding:12px 16px calc(16px + env(safe-area-inset-bottom,0px));
}
.fs-scrubber-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.fs-frame-btn {
  width:40px; height:40px; border-radius:10px; border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08); color:#fff; font-size:20px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;
  user-select:none; -webkit-user-select:none;
}
.fs-frame-btn:active { background:var(--green); color:#000; }
.fs-scrub {
  flex:1; -webkit-appearance:none; height:5px; border-radius:3px;
  background:rgba(255,255,255,0.2); outline:none;
}
.fs-scrub::-webkit-slider-thumb {
  -webkit-appearance:none; width:24px; height:24px; border-radius:50%;
  background:var(--green); cursor:pointer; box-shadow:0 0 10px rgba(0,230,118,0.6);
}
.fs-info-row { display:flex; align-items:center; justify-content:space-between; }
.fs-frame-count { font-family:'Bebas Neue'; font-size:16px; color:var(--green); letter-spacing:1px; }
.fs-time-str { font-size:11px; color:rgba(255,255,255,0.5); }
.fs-fps-row { display:flex; gap:5px; margin-top:8px; }
.fs-fps-btn {
  font-size:10px; font-weight:700; letter-spacing:1px; padding:4px 9px;
  border-radius:16px; border:1px solid rgba(255,255,255,0.15);
  background:transparent; color:rgba(255,255,255,0.5); cursor:pointer;
}
.fs-fps-btn.on { background:rgba(0,230,118,0.15); color:var(--green); border-color:rgba(0,230,118,0.4); }
.fs-action-row { display:flex; gap:8px; margin-top:10px; }
.fs-action-btn {
  flex:1; padding:12px; border-radius:10px; border:none; cursor:pointer;
  font-family:'Bebas Neue'; font-size:15px; letter-spacing:2px; text-align:center;
  user-select:none; -webkit-user-select:none;
}
.fs-action-btn:active { opacity:0.8; }
.fs-btn-green { background:var(--green); color:#000; }
.fs-btn-dim   { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; }
.fs-btn-back  { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.5); }
.fs-btn-disabled { opacity:0.35; pointer-events:none; }

/* ── Style panel / results ── */
.style-panel { margin:12px 20px 0; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.sp-header { padding:12px 16px; border-bottom:1px solid var(--border); font-family:'Bebas Neue'; font-size:15px; letter-spacing:2px; color:var(--green); }
.sp-row { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.sp-row:last-child { border-bottom:none; }
.sp-label { font-size:13px; font-weight:500; }
.sp-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.swatches { display:flex; gap:7px; }
.sw { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
.sw.on { border-color:#fff; transform:scale(1.2); }
input[type=range].sp-range {
  -webkit-appearance:none; width:110px; height:4px; border-radius:2px;
  background:var(--border); outline:none;
}
input[type=range].sp-range::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
  background:var(--green); cursor:pointer;
}
select { background:var(--s2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:5px 10px; font-size:12px; }

.export-card { margin:12px 20px 0; background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.ex-row { padding:13px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.ex-row:last-child { border-bottom:none; }
.ex-ic { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.ex-info { flex:1; }
.ex-name { font-size:13px; font-weight:600; }
.ex-desc { font-size:11px; color:var(--muted); margin-top:1px; }
.ex-btn { padding:7px 14px; border-radius:8px; font-family:'Bebas Neue'; font-size:13px; letter-spacing:2px; border:none; cursor:pointer; }
.ex-btn:active { opacity:0.8; }
.ex-green { background:var(--green); color:#000; }
.ex-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn {
  width:100%; padding:16px; border:none; border-radius:12px;
  font-family:'Bebas Neue'; font-size:20px; letter-spacing:3px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  cursor:pointer;
}
.btn:active { opacity:0.85; transform:scale(0.98); }
.btn-dark { background:var(--s2); color:var(--text); border:1px solid var(--border); }
.controls { padding:0 20px; display:flex; flex-direction:column; gap:10px; }
.section-title { font-family:'Bebas Neue'; font-size:18px; letter-spacing:3px; color:var(--green); padding:0 20px; margin:14px 0 8px; }

/* ── Toast ── */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:11px 18px; font-size:13px; display:flex; align-items:center; gap:7px;
  box-shadow:0 8px 30px rgba(0,0,0,0.5); z-index:999; max-width:88vw;
  animation:toastIn 0.25s ease;
}
.toast.ok { border-color:rgba(0,230,118,0.4); color:var(--green); }
.toast.err { border-color:rgba(255,68,68,0.4); color:var(--red); }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
'use strict';
const { useState, useEffect, useRef } = React;
const h = React.createElement;

// ── CONSTANTS ──────────────────────────────────────────────
const COLORS = ['#00e676','#ffffff','#ffd700','#ff6b35','#448aff','#ff4444'];
const STYLES = ['Broadcast','Glow','Dotted','Classic'];
const LS_KEY = 'tracer-settings-v2';

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && s.color) return s;
  } catch(_){}
  return { color:'#00e676', lineWidth:3.5, style:'Broadcast' };
}

// ── GEOMETRY / SMOOTHING ───────────────────────────────────
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// Resample a polyline to evenly spaced points
function resample(pts, spacing) {
  if (pts.length < 2) return pts.slice();
  const out = [pts[0]];
  let acc = 0;
  for (let i = 1; i < pts.length; i++) {
    let prev = out.length ? { ...pts[i-1] } : pts[i-1];
    let cur = pts[i];
    let d = dist(pts[i-1], cur);
    let from = pts[i-1];
    while (acc + d >= spacing) {
      const t = (spacing - acc) / d;
      const np = { x: from.x + (cur.x - from.x) * t, y: from.y + (cur.y - from.y) * t };
      out.push(np);
      from = np;
      d = dist(from, cur);
      acc = 0;
    }
    acc += d;
  }
  const last = pts[pts.length - 1];
  if (dist(out[out.length-1], last) > spacing * 0.25) out.push(last);
  return out;
}

// Moving-average smoothing, endpoints pinned
function movingAvg(pts, w) {
  if (pts.length < 3) return pts.slice();
  const out = [];
  for (let i = 0; i < pts.length; i++) {
    let sx = 0, sy = 0, n = 0;
    for (let j = Math.max(0, i - w); j <= Math.min(pts.length - 1, i + w); j++) {
      sx += pts[j].x; sy += pts[j].y; n++;
    }
    out.push({ x: sx / n, y: sy / n });
  }
  out[0] = pts[0];
  out[out.length - 1] = pts[pts.length - 1];
  return out;
}

// Catmull-Rom interpolation → silky curve through smoothed points
function catmullRom(pts, segs) {
  if (pts.length < 3) return pts.slice();
  const out = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(0, i - 1)], p1 = pts[i],
          p2 = pts[i + 1], p3 = pts[Math.min(pts.length - 1, i + 2)];
    for (let j = 0; j < segs; j++) {
      const t = j / segs, t2 = t * t, t3 = t2 * t;
      out.push({
        x: 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
        y: 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
      });
    }
  }
  out.push(pts[pts.length - 1]);
  return out;
}

// Full pipeline: raw finger points → broadcast-smooth path snapped to start point
function buildPath(raw, startPt, vidW) {
  if (!raw || raw.length < 3) return null;
  // Drop duplicate/jittery points, snap start to the marked ball position
  let pts = raw.filter((p, i) => i === 0 || dist(p, raw[i-1]) > 1);
  if (startPt) {
    const snapR = vidW * 0.03;
    pts = pts.filter(p => dist(p, startPt) > snapR);
    pts.unshift(startPt);
  }
  if (pts.length < 3) return null;
  let s = resample(pts, Math.max(6, vidW / 70));  // even spacing
  s = movingAvg(s, 2);                             // kill finger shake
  s = catmullRom(s, 5);                            // smooth curve
  s = resample(s, Math.max(3, vidW / 220));        // uniform density → even animation speed
  return s.length >= 4 ? s : null;
}

// ── TRACER DRAW (broadcast-quality) ────────────────────────
function drawBroadcastTracer(ctx, pts, progress, color, lw, style) {
  if (!pts || pts.length < 2) return;
  const n = Math.max(2, Math.round(pts.length * progress));
  const vis = pts.slice(0, n);
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

  if (style === 'Dotted') {
    for (let i = 1; i < vis.length; i += 3) {
      const t = i / vis.length;
      const r = lw * (0.6 + t * 1.4);
      ctx.save();
      ctx.globalAlpha = 0.25 + t * 0.75;
      ctx.beginPath();
      ctx.arc(vis[i].x, vis[i].y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      if (t > 0.7) { ctx.shadowColor = color; ctx.shadowBlur = 6; }
      ctx.fill();
      ctx.restore();
    }
  } else {
    for (let i = 1; i < vis.length; i++) {
      const t = i / vis.length;
      const alpha = 0.15 + t * 0.85;
      const segW = lw * (0.4 + t * 0.6);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.lineWidth = segW;
      ctx.lineCap = 'round';
      if (style === 'Broadcast' || style === 'Glow') {
        ctx.shadowColor = color;
        ctx.shadowBlur = style === 'Glow' ? 18 * t : 8 * t;
      }
      if (style === 'Classic') ctx.setLineDash([segW * 2, segW]);
      ctx.beginPath();
      ctx.moveTo(vis[i-1].x, vis[i-1].y);
      ctx.lineTo(vis[i].x, vis[i].y);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Impact dot
  if (progress > 0.02) {
    const s = vis[0];
    ctx.save();
    ctx.beginPath(); ctx.arc(s.x, s.y, lw * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.globalAlpha = 0.7;
    ctx.shadowColor = color; ctx.shadowBlur = 10;
    ctx.fill(); ctx.restore();
  }

  // Ball at leading edge
  const head = vis[vis.length - 1];
  ctx.save();
  ctx.beginPath(); ctx.arc(head.x, head.y, lw * 3.5, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.globalAlpha = 0.25;
  ctx.shadowColor = color; ctx.shadowBlur = 20;
  ctx.fill();
  ctx.beginPath(); ctx.arc(head.x, head.y, lw * 2.2, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 1;
  ctx.shadowColor = color; ctx.shadowBlur = 12;
  ctx.fill(); ctx.restore();
}

// Start-point marker drawn ON the canvas (always perfectly aligned with video)
function drawStartMarker(ctx, pt, color) {
  if (!pt) return;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 3]);
  ctx.shadowColor = color; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, 14, 0, Math.PI * 2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();
}

// Convert a screen tap to canvas-native pixels, accounting for object-fit:contain letterboxing
function tapToCanvas(clientX, clientY, videoEl) {
  const rect = videoEl.getBoundingClientRect();
  const vW = videoEl.videoWidth, vH = videoEl.videoHeight;
  const vidRatio = vW / vH, boxRatio = rect.width / rect.height;
  let drawW, drawH, offX, offY;
  if (vidRatio > boxRatio) {
    drawW = rect.width; drawH = drawW / vidRatio;
    offX = 0; offY = (rect.height - drawH) / 2;
  } else {
    drawH = rect.height; drawW = drawH * vidRatio;
    offX = (rect.width - drawW) / 2; offY = 0;
  }
  return {
    x: (clientX - rect.left - offX) / drawW * vW,
    y: (clientY - rect.top - offY) / drawH * vH,
  };
}

// ── ERROR BOUNDARY ─────────────────────────────────────────
class ErrBoundary extends React.Component {
  constructor(p){ super(p); this.state = { err:null }; }
  static getDerivedStateFromError(e){ return { err:e }; }
  render(){
    if (this.state.err) return h('div',{style:{margin:'80px 20px',background:'#111',border:'1px solid #ff4444',borderRadius:14,padding:20}},
      h('div',{style:{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2,color:'#ff4444',marginBottom:10}},'SOMETHING BROKE'),
      h('pre',{style:{fontSize:12,color:'#666',background:'#000',padding:12,borderRadius:8,whiteSpace:'pre-wrap',wordBreak:'break-word'}},String(this.state.err.message||this.state.err)),
      h('button',{style:{marginTop:16,background:'#00e676',color:'#000',border:'none',borderRadius:10,padding:'14px 24px',fontFamily:'Bebas Neue',fontSize:18,letterSpacing:3,cursor:'pointer'},onClick:()=>location.reload()},'RELOAD')
    );
    return this.props.children;
  }
}

// ══════════════════════════════════════════════════════════
// MAIN APP
// Flow: upload → mark (step 0: tap ball, step 1: set landing, step 2: draw) → results
// ══════════════════════════════════════════════════════════
function App() {
  // ── refs ──
  const videoRef   = useRef(null);
  const overlayRef = useRef(null);
  const drawRef    = useRef(null);   // touch layer for tapping + drawing
  const fileRef    = useRef(null);
  const animRef    = useRef(null);

  const startPtRef   = useRef(null); // {x,y} canvas-native ball position at impact
  const startTimeRef = useRef(0);    // video time of impact
  const endTimeRef   = useRef(null); // video time of landing
  const rawRef       = useRef([]);   // raw finger points during draw
  const pathRef      = useRef(null); // final smoothed tracer path
  const drawingRef   = useRef(false);

  const settingsRef = useRef(loadSettings());
  const markStepRef = useRef(0);
  const screenRef   = useRef('upload');

  // ── state ──
  const [screen, setScreen]     = useState('upload'); // upload | mark | results
  const [videoUrl, setVideoUrl] = useState(null);
  const [isDrag, setIsDrag]     = useState(false);
  const [vidReady, setVidReady] = useState(false);
  const [markStep, setMarkStep] = useState(0); // 0 tap ball | 1 set landing | 2 draw
  const [hasStart, setHasStart] = useState(false);
  const [hasPath, setHasPath]   = useState(false);
  const [settings, setSettings] = useState(settingsRef.current);
  const [toast, setToast]       = useState(null);
  const [exportPct, setExportPct] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);

  const [fps, setFps] = useState(30);
  const [currentFrame, setCurrentFrame] = useState(0);
  const [totalFrames, setTotalFrames]   = useState(0);

  // keep refs in sync (animation loop + native listeners read these)
  useEffect(() => { settingsRef.current = settings; try { localStorage.setItem(LS_KEY, JSON.stringify(settings)); } catch(_){} }, [settings]);
  useEffect(() => { markStepRef.current = markStep; }, [markStep]);
  useEffect(() => { screenRef.current = screen; }, [screen]);

  const toastTimerRef = useRef(null);
  const showToast = (msg, type) => {
    setToast({ msg, type: type || 'ok' });
    clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(null), 2600);
  };

  // ── Canvas layout: size + position overlay to EXACTLY match the displayed video content
  // (fixes letterbox misalignment in fullscreen mode)
  const layoutOverlay = () => {
    const v = videoRef.current, c = overlayRef.current;
    if (!v || !c || !v.videoWidth) return;
    const rect = v.getBoundingClientRect();
    if (rect.width === 0) return;
    const vr = v.videoWidth / v.videoHeight, br = rect.width / rect.height;
    let w, hh, x, y;
    if (vr > br) { w = rect.width; hh = w / vr; x = 0; y = (rect.height - hh) / 2; }
    else { hh = rect.height; w = hh * vr; x = (rect.width - w) / 2; y = 0; }
    c.style.left = x + 'px'; c.style.top = y + 'px';
    c.style.width = w + 'px'; c.style.height = hh + 'px';
    if (c.width !== v.videoWidth || c.height !== v.videoHeight) {
      c.width = v.videoWidth; c.height = v.videoHeight; // resets canvas — redraw below
    }
    redrawCurrent();
  };

  // Redraw whatever belongs on the overlay for the current mode
  const redrawCurrent = () => {
    const c = overlayRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    const s = settingsRef.current;
    if (screenRef.current === 'results' && pathRef.current) {
      const v = videoRef.current;
      if (v && !v.paused) return; // animation loop owns the canvas while playing
      drawBroadcastTracer(ctx, pathRef.current, 1, s.color, s.lineWidth, s.style);
    } else if (screenRef.current === 'mark') {
      ctx.clearRect(0, 0, c.width, c.height);
      if (markStepRef.current === 2 && rawRef.current.length > 1) renderDrawPreview();
      drawStartMarker(ctx, startPtRef.current, s.color);
    } else {
      ctx.clearRect(0, 0, c.width, c.height);
    }
  };

  // Live preview while finger is drawing
  const renderDrawPreview = () => {
    const c = overlayRef.current; if (!c) return;
    const ctx = c.getContext('2d');
    const s = settingsRef.current;
    ctx.clearRect(0, 0, c.width, c.height);
    drawStartMarker(ctx, startPtRef.current, s.color);
    const pts = rawRef.current;
    if (pts.length > 1) {
      ctx.save();
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.lineWidth * 1.2;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.globalAlpha = 0.9;
      ctx.shadowColor = s.color; ctx.shadowBlur = 10;
      ctx.beginPath();
      pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.stroke();
      ctx.restore();
    }
  };

  // Relayout on resize / rotation / mode change
  useEffect(() => {
    layoutOverlay();
    const onR = () => setTimeout(layoutOverlay, 60);
    window.addEventListener('resize', onR);
    window.addEventListener('orientationchange', onR);
    return () => { window.removeEventListener('resize', onR); window.removeEventListener('orientationchange', onR); };
  }, [screen, markStep, vidReady]);

  // ── Frame scrubber ──
  useEffect(() => {
    const v = videoRef.current; if (!v) return;
    const onTime = () => setCurrentFrame(Math.round(v.currentTime * fps));
    v.addEventListener('timeupdate', onTime);
    return () => v.removeEventListener('timeupdate', onTime);
  }, [fps, vidReady]);

  useEffect(() => {
    const v = videoRef.current;
    if (v && v.duration && isFinite(v.duration)) setTotalFrames(Math.round(v.duration * fps));
  }, [vidReady, fps]);

  const seekToFrame = (frame) => {
    const v = videoRef.current; if (!v) return;
    v.pause();
    const clamped = Math.max(0, Math.min(totalFrames, frame));
    v.currentTime = clamped / fps;
    setCurrentFrame(clamped);
  };
  const stepFrame = (d) => seekToFrame(Math.round(videoRef.current.currentTime * fps) + d);

  const togglePlay = () => {
    const v = videoRef.current; if (!v) return;
    if (v.paused) v.play().catch(()=>{}); else v.pause();
  };

  // ── Load file ──
  const loadFile = (file) => {
    if (!file || !file.type.startsWith('video/')) { showToast('Please pick a video file', 'err'); return; }
    setVideoUrl(URL.createObjectURL(file));
    setVidReady(false);
    resetAll();
    setScreen('mark');
  };

  const resetAll = () => {
    setMarkStep(0); setHasStart(false); setHasPath(false);
    startPtRef.current = null; startTimeRef.current = 0; endTimeRef.current = null;
    rawRef.current = []; pathRef.current = null;
    const c = overlayRef.current;
    if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
  };

  // ── Video ready (with iOS polling fallback) ──
  const onVidReady = () => {
    const v = videoRef.current;
    if (v && v.videoWidth > 0) { setVidReady(true); setTimeout(layoutOverlay, 50); }
  };
  useEffect(() => {
    if (!videoUrl) return;
    const id = setInterval(() => {
      const v = videoRef.current;
      if (v && v.videoWidth > 0) { setVidReady(true); layoutOverlay(); clearInterval(id); }
    }, 150);
    return () => clearInterval(id);
  }, [videoUrl]);

  // Track play state
  useEffect(() => {
    const v = videoRef.current; if (!v) return;
    const onPlay = () => setIsPlaying(true);
    const onStop = () => { setIsPlaying(false); redrawCurrent(); };
    v.addEventListener('play', onPlay);
    v.addEventListener('pause', onStop);
    v.addEventListener('ended', onStop);
    return () => { v.removeEventListener('play', onPlay); v.removeEventListener('pause', onStop); v.removeEventListener('ended', onStop); };
  }, [vidReady]);

  // ── TOUCH LAYER: tap to mark ball (step 0) + finger draw (step 2) ──
  // Native listeners with passive:false — React's synthetic touch events are passive,
  // so preventDefault (needed to stop page scroll while drawing) only works this way.
  useEffect(() => {
    const layer = drawRef.current;
    if (!layer || screen !== 'mark') return;

    const pt = (cx, cy) => tapToCanvas(cx, cy, videoRef.current);

    const onStart = (e) => {
      const step = markStepRef.current;
      if (step !== 0 && step !== 2) return;
      e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      if (step === 2) {
        drawingRef.current = true;
        rawRef.current = [pt(t.clientX, t.clientY)]; // new stroke replaces old
        renderDrawPreview();
      }
    };
    const onMove = (e) => {
      if (markStepRef.current !== 2 || !drawingRef.current) return;
      e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      if (rawRef.current.length < 2500) rawRef.current.push(pt(t.clientX, t.clientY));
      renderDrawPreview();
    };
    const onEnd = (e) => {
      const step = markStepRef.current;
      if (step === 0) {
        e.preventDefault();
        const t = e.changedTouches ? e.changedTouches[0] : e;
        const p = pt(t.clientX, t.clientY);
        startPtRef.current = p;
        startTimeRef.current = videoRef.current.currentTime;
        setHasStart(true);
        redrawCurrent();
      } else if (step === 2) {
        e.preventDefault();
        drawingRef.current = false;
        setHasPath(rawRef.current.length > 4);
      }
    };

    layer.addEventListener('touchstart', onStart, { passive:false });
    layer.addEventListener('touchmove',  onMove,  { passive:false });
    layer.addEventListener('touchend',   onEnd,   { passive:false });
    // mouse fallback for desktop testing
    let mouseDown = false;
    const mDown = (e) => { mouseDown = true; onStart(e); };
    const mMove = (e) => { if (mouseDown) onMove(e); };
    const mUp   = (e) => { if (mouseDown) { mouseDown = false; onEnd(e); } };
    layer.addEventListener('mousedown', mDown);
    layer.addEventListener('mousemove', mMove);
    layer.addEventListener('mouseup', mUp);
    return () => {
      layer.removeEventListener('touchstart', onStart);
      layer.removeEventListener('touchmove', onMove);
      layer.removeEventListener('touchend', onEnd);
      layer.removeEventListener('mousedown', mDown);
      layer.removeEventListener('mousemove', mMove);
      layer.removeEventListener('mouseup', mUp);
    };
  }, [screen]);

  // ── Step transitions ──
  const goLandingStep = () => {
    if (!startPtRef.current) { showToast('Tap the ball first', 'err'); return; }
    setMarkStep(1);
  };

  const setLanding = () => {
    const v = videoRef.current; if (!v) return;
    if (v.currentTime <= startTimeRef.current + 0.15) {
      showToast('Scrub forward to the landing moment first', 'err'); return;
    }
    endTimeRef.current = v.currentTime;
    setMarkStep(2);
    // Park the video mid-flight so the ball's path is visible while drawing
    v.pause();
    v.currentTime = (startTimeRef.current + endTimeRef.current) / 2;
    setTimeout(redrawCurrent, 100);
  };

  const clearStroke = () => {
    rawRef.current = []; setHasPath(false);
    redrawCurrent();
  };

  const finishDraw = () => {
    const v = videoRef.current;
    const p = buildPath(rawRef.current, startPtRef.current, v.videoWidth);
    if (!p) { showToast('Draw a longer stroke from the green dot', 'err'); return; }
    pathRef.current = p;
    v.pause();
    v.currentTime = Math.max(0, startTimeRef.current - 0.8);
    setScreen('results');
    setTimeout(layoutOverlay, 80);
  };

  const backStep = () => {
    if (markStep === 2) { rawRef.current = []; setHasPath(false); setMarkStep(1); }
    else if (markStep === 1) setMarkStep(0);
    setTimeout(redrawCurrent, 60);
  };

  const exitToUpload = () => {
    const v = videoRef.current; if (v) v.pause();
    setScreen('upload'); setVideoUrl(null); resetAll();
  };

  // ── Animation loop: draws tracer synced to video time while playing ──
  useEffect(() => {
    function loop() {
      const v = videoRef.current, c = overlayRef.current, path = pathRef.current;
      const s = settingsRef.current;
      if (screenRef.current === 'results' && v && c && path && !v.paused) {
        const t0 = startTimeRef.current;
        const t1 = endTimeRef.current;
        const dur = (t1 !== null && t1 > t0) ? (t1 - t0) : 3;
        const ctx = c.getContext('2d');
        if (v.currentTime < t0) ctx.clearRect(0, 0, c.width, c.height);
        else {
          const prog = Math.min(1, (v.currentTime - t0) / dur);
          drawBroadcastTracer(ctx, path, prog, s.color, s.lineWidth, s.style);
        }
      }
      animRef.current = requestAnimationFrame(loop);
    }
    animRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  // Redraw static path when style settings change
  useEffect(() => { redrawCurrent(); }, [settings]);

  // Entering results: show full arc preview, parked just before impact
  useEffect(() => {
    if (screen !== 'results') return;
    const v = videoRef.current;
    if (v) { v.pause(); v.currentTime = Math.max(0, startTimeRef.current - 0.8); }
    setTimeout(() => { layoutOverlay(); }, 100);
  }, [screen]);

  const playTracer = () => {
    const v = videoRef.current; if (!v) return;
    const c = overlayRef.current;
    if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
    v.currentTime = Math.max(0, startTimeRef.current - 0.8);
    v.play().catch(()=>{});
  };

  // ── Export: re-renders video + tracer to a canvas, records a tight clip ──
  const exportVideo = async () => {
    const v = videoRef.current, path = pathRef.current;
    if (!v || !path) return;
    if (typeof MediaRecorder === 'undefined' || !HTMLCanvasElement.prototype.captureStream) {
      showToast('Export not supported here — screen-record instead', 'err'); return;
    }
    try {
      setExportPct(0);
      const W = v.videoWidth, H = v.videoHeight;
      const canvas = document.createElement('canvas'); canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      const tmp = document.createElement('canvas'); tmp.width = W; tmp.height = H;
      const tctx = tmp.getContext('2d');

      // Prefer mp4 (plays natively on iOS), fall back to webm
      const mimes = ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm'];
      const mime = mimes.find(m => MediaRecorder.isTypeSupported(m));
      if (!mime) { showToast('No supported recorder format', 'err'); setExportPct(null); return; }
      const ext = mime.startsWith('video/mp4') ? 'mp4' : 'webm';

      const t0 = startTimeRef.current;
      const t1 = endTimeRef.current || (t0 + 3);
      const clipStart = Math.max(0, t0 - 1.0);
      const clipEnd   = Math.min(v.duration || (t1 + 2), t1 + 1.5);

      const stream = canvas.captureStream(30);
      const rec = new MediaRecorder(stream, { mimeType: mime });
      const chunks = [];
      rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      rec.onstop = () => {
        const blob = new Blob(chunks, { type: mime });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'golf-tracer.' + ext; a.click();
        setExportPct(null);
        showToast('Clip saved (' + ext.toUpperCase() + ', no audio)');
      };

      v.pause();
      v.currentTime = clipStart;
      await new Promise(r => setTimeout(r, 250));
      rec.start(100);
      try { await v.play(); } catch(_){}

      const s = settingsRef.current;
      let stopped = false;
      const render = () => {
        if (stopped) return;
        const ct = v.currentTime;
        setExportPct(Math.min(99, Math.round((ct - clipStart) / (clipEnd - clipStart) * 100)));
        ctx.drawImage(v, 0, 0, W, H);
        if (ct >= t0) {
          const dur = Math.max(0.3, t1 - t0);
          const prog = Math.min(1, (ct - t0) / dur);
          tctx.clearRect(0, 0, W, H);
          drawBroadcastTracer(tctx, path, prog, s.color, s.lineWidth, s.style);
          ctx.drawImage(tmp, 0, 0);
        }
        if (ct >= clipEnd || v.ended) {
          stopped = true;
          v.pause();
          rec.stop();
        } else {
          requestAnimationFrame(render);
        }
      };
      requestAnimationFrame(render);
    } catch(err) {
      console.error(err);
      showToast('Export failed', 'err');
      setExportPct(null);
    }
  };

  // ══════════════════════════════════════════════════════
  // RENDER — single persistent <video> so currentTime survives screen changes
  // ══════════════════════════════════════════════════════
  const STEP_TITLES = ['TAP THE BALL', 'FIND THE LANDING', 'DRAW THE FLIGHT'];
  const STEP_SUBS = [
    'Scrub to the impact frame, then tap the ball. Re-tap to adjust.',
    'Scrub (or press ▶) to the moment the ball lands or disappears.',
    'Drag your finger from the green dot along the flight. Draw again to redo.',
  ];
  const inMark = screen === 'mark';
  const inResults = screen === 'results';

  return h('div', null,

    !inMark && h('div', { className:'header' },
      h('div', { className:'logo' }, 'TRACER', h('span', null, '.')),
      h('div', { className:'badge' }, screen === 'upload' ? 'READY' : 'COMPLETE')
    ),

    // ── PERSISTENT VIDEO LAYER ──
    videoUrl && h('div', {
      key:'persistent-vid',
      style: inMark
        ? { position:'fixed', inset:0, zIndex:200, background:'#000', display:'flex', flexDirection:'column' }
        : inResults
        ? { margin:'74px 20px 0', borderRadius:16, overflow:'hidden', background:'#000', position:'relative', border:'1px solid #222' }
        : { display:'none' }
    },
      h('div', { style:{ position:'relative', flex: inMark ? 1 : undefined, overflow:'hidden' } },

        // VIDEO
        h('video', {
          ref:videoRef, src:videoUrl, playsInline:true, muted:true, preload:'auto',
          controls: inResults,
          'webkit-playsinline':'true',
          style: inMark
            ? { width:'100%', height:'100%', objectFit:'contain', display:'block' }
            : { width:'100%', display:'block' },
          onLoadedMetadata:onVidReady, onLoadedData:onVidReady, onCanPlay:onVidReady,
        }),

        // OVERLAY CANVAS — positioned by layoutOverlay() to match video content exactly
        h('canvas', {
          ref:overlayRef,
          style:{ position:'absolute', top:0, left:0, pointerEvents:'none', zIndex:5 }
        }),

        // TOUCH LAYER (mark mode, steps 0 and 2)
        inMark && (markStep === 0 || markStep === 2) && h('div', {
          ref:drawRef,
          style:{ position:'absolute', inset:0, zIndex:8, cursor:'crosshair', touchAction:'none' }
        }),

        // Top instruction
        inMark && h('div', { className:'fs-topbar' },
          h('div', { className:'fs-step-badge' }, 'STEP ' + (markStep + 1) + ' OF 3'),
          h('div', { style:{ flex:1 } },
            h('div', { className:'fs-instruct-title' }, STEP_TITLES[markStep]),
            h('div', { className:'fs-instruct-sub' }, STEP_SUBS[markStep])
          )
        ),
        inMark && h('div', { className:'fs-stepdots' },
          [0,1,2].map(i => h('div', { key:i, className:'fs-dot' + (markStep > i ? ' done' : markStep === i ? ' active' : '') }))
        ),

        // PLAY TRACER (results)
        inResults && h('div', { style:{ position:'absolute', bottom:52, left:'50%', transform:'translateX(-50%)', zIndex:10 } },
          h('div', {
            style:{
              background:'rgba(0,0,0,0.85)', border:'2px solid #00e676', borderRadius:30,
              color:'#00e676', fontFamily:'Bebas Neue', fontSize:17, letterSpacing:3,
              padding:'10px 22px', cursor:'pointer', backdropFilter:'blur(10px)',
              display:'flex', alignItems:'center', gap:8, whiteSpace:'nowrap',
            },
            onClick:playTracer,
            onTouchEnd:e => { e.preventDefault(); playTracer(); }
          },
            h('span', { style:{ fontSize:18 } }, isPlaying ? '◼' : '▶'),
            isPlaying ? 'PLAYING…' : 'PLAY TRACER'
          )
        )
      ),

      // MARK bottom HUD
      inMark && h('div', { className:'fs-bottom' },
        h('div', { className:'fs-scrubber-row' },
          h('div', { className:'fs-frame-btn', onClick:()=>stepFrame(-1), onTouchEnd:e=>{e.preventDefault();stepFrame(-1);} }, '‹'),
          h('div', { className:'fs-frame-btn', onClick:togglePlay, onTouchEnd:e=>{e.preventDefault();togglePlay();} }, isPlaying ? '❚❚' : '▶'),
          h('input', { className:'fs-scrub', type:'range', min:0, max:totalFrames || 100, step:1, value:currentFrame,
            onChange:e=>seekToFrame(parseInt(e.target.value)),
            onInput: e=>seekToFrame(parseInt(e.target.value)),
          }),
          h('div', { className:'fs-frame-btn', onClick:()=>stepFrame(1), onTouchEnd:e=>{e.preventDefault();stepFrame(1);} }, '›'),
        ),
        h('div', { className:'fs-info-row' },
          h('div', { className:'fs-frame-count' }, 'F' + currentFrame + ' / ' + totalFrames),
          h('div', { className:'fs-time-str' }, (currentFrame / fps).toFixed(3) + 's')
        ),
        markStep === 0 && h('div', { className:'fs-fps-row' },
          [24,30,60,120,240].map(f =>
            h('div', { key:f, className:'fs-fps-btn' + (fps === f ? ' on' : ''),
              onClick:()=>{ setFps(f); setTotalFrames(Math.round((videoRef.current?.duration || 0) * f)); },
              onTouchEnd:e=>{ e.preventDefault(); setFps(f); setTotalFrames(Math.round((videoRef.current?.duration || 0) * f)); }
            }, f + 'fps')
          )
        ),
        h('div', { className:'fs-action-row' },
          markStep > 0 && h('div', { className:'fs-action-btn fs-btn-dim', onClick:backStep, onTouchEnd:e=>{e.preventDefault();backStep();} }, '← BACK'),

          markStep === 0 && h('div', {
            className:'fs-action-btn fs-btn-green' + (hasStart ? '' : ' fs-btn-disabled'),
            onClick:goLandingStep, onTouchEnd:e=>{e.preventDefault();goLandingStep();}
          }, 'NEXT →'),

          markStep === 1 && h('div', {
            className:'fs-action-btn fs-btn-green',
            onClick:setLanding, onTouchEnd:e=>{e.preventDefault();setLanding();}
          }, 'SET LANDING ✓'),

          markStep === 2 && h('div', {
            className:'fs-action-btn fs-btn-dim' + (hasPath ? '' : ' fs-btn-disabled'),
            onClick:clearStroke, onTouchEnd:e=>{e.preventDefault();clearStroke();}
          }, 'CLEAR'),
          markStep === 2 && h('div', {
            className:'fs-action-btn fs-btn-green' + (hasPath ? '' : ' fs-btn-disabled'),
            onClick:finishDraw, onTouchEnd:e=>{e.preventDefault();finishDraw();}
          }, 'DONE ✓'),

          h('div', { className:'fs-action-btn fs-btn-back', onClick:exitToUpload, onTouchEnd:e=>{e.preventDefault();exitToUpload();} }, '✕')
        )
      )
    ),

    // ── UPLOAD SCREEN ──
    screen === 'upload' && h('div', { className:'screen' },
      h('div', { style:{ padding:'24px 20px 10px' } },
        h('div', { style:{ fontFamily:'Bebas Neue', fontSize:34, letterSpacing:4, lineHeight:1.05 } },
          'GOLF SHOT', h('br'), h('span', { style:{ color:'var(--green)' } }, 'TRACER')
        ),
        h('p', { style:{ fontSize:13, color:'var(--muted)', marginTop:8, lineHeight:1.6 } },
          'Tap the ball, draw the flight with your finger, get a broadcast tracer.')
      ),
      h('div', {
        className:'drop-zone' + (isDrag ? ' over' : ''),
        onDragOver:e=>{ e.preventDefault(); setIsDrag(true); },
        onDragLeave:()=>setIsDrag(false),
        onDrop:e=>{ e.preventDefault(); setIsDrag(false); loadFile(e.dataTransfer.files[0]); }
      },
        h('div', { className:'drop-icon' },
          h('svg', { viewBox:'0 0 24 24' },
            h('path', { d:'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4' }),
            h('polyline', { points:'17 8 12 3 7 8' }),
            h('line', { x1:12, y1:3, x2:12, y2:15 })
          )
        ),
        h('div', { className:'drop-title' }, 'UPLOAD SWING VIDEO'),
        h('div', { className:'drop-sub' }, 'Any video from camera roll', h('br'), 'Steady camera works best'),
        h('button', { className:'choose-btn', onClick:()=>fileRef.current && fileRef.current.click() }, 'CHOOSE VIDEO'),
        h('input', { ref:fileRef, type:'file', accept:'video/*', style:{ display:'none' }, onChange:e=>loadFile(e.target.files[0]) })
      ),
      h('div', { className:'tips-grid' },
        [
          { ic:'📷', t:'Steady Camera', d:'Tripod or braced hand.' },
          { ic:'🎯', t:'One Tap', d:'Mark the ball at impact.' },
          { ic:'✍️', t:'Finger Draw', d:'Trace the flight you saw.' },
          { ic:'🎬', t:'Auto Overlay', d:'Tracer syncs to the real flight time.' },
        ].map(({ic,t,d}) => h('div', { key:t, className:'tip' },
          h('div', { className:'tip-ic' }, ic), h('div', { className:'tip-t' }, t), h('div', { className:'tip-d' }, d)
        ))
      )
    ),

    // ── RESULTS SCREEN ──
    inResults && h('div', { style:{ paddingBottom:40, paddingTop:8 } },
      h('div', { className:'style-panel' },
        h('div', { className:'sp-header' }, 'TRACER STYLE'),
        h('div', { className:'sp-row' },
          h('div', null, h('div', { className:'sp-label' }, 'Color')),
          h('div', { className:'swatches' },
            COLORS.map(c => h('div', { key:c, className:'sw' + (settings.color === c ? ' on' : ''), style:{ background:c },
              onClick:()=>setSettings(s=>({...s, color:c})),
              onTouchEnd:e=>{ e.preventDefault(); setSettings(s=>({...s, color:c})); }
            }))
          )
        ),
        h('div', { className:'sp-row' },
          h('div', null, h('div', { className:'sp-label' }, 'Style')),
          h('select', { value:settings.style, onChange:e=>setSettings(s=>({...s, style:e.target.value})) },
            STYLES.map(st => h('option', { key:st }, st)))
        ),
        h('div', { className:'sp-row' },
          h('div', null, h('div', { className:'sp-label' }, 'Width'), h('div', { className:'sp-sub' }, settings.lineWidth.toFixed(1) + 'px')),
          h('input', { className:'sp-range', type:'range', min:1.5, max:7, step:0.5, value:settings.lineWidth,
            onChange:e=>setSettings(s=>({...s, lineWidth:parseFloat(e.target.value)})) })
        )
      ),
      h('div', { className:'section-title' }, 'EXPORT'),
      h('div', { className:'export-card' },
        h('div', { className:'ex-row' },
          h('div', { className:'ex-ic', style:{ background:'rgba(0,230,118,0.1)' } }, '🎬'),
          h('div', { className:'ex-info' },
            h('div', { className:'ex-name' }, 'Save clip with tracer'),
            h('div', { className:'ex-desc' }, 'Trimmed around the shot · no audio')
          ),
          h('button', { className:'ex-btn ex-green', onClick:exportVideo, disabled:exportPct !== null },
            exportPct !== null ? exportPct + '%' : 'SAVE')
        ),
        h('div', { className:'ex-row' },
          h('div', { className:'ex-ic', style:{ background:'rgba(255,255,255,0.05)' } }, '✍️'),
          h('div', { className:'ex-info' },
            h('div', { className:'ex-name' }, 'Redraw flight'),
            h('div', { className:'ex-desc' }, 'Keep the start point, draw a new shape')
          ),
          h('button', { className:'ex-btn ex-outline', onClick:()=>{
            rawRef.current = []; pathRef.current = null; setHasPath(false);
            setMarkStep(2); setScreen('mark');
            const v = videoRef.current;
            if (v && endTimeRef.current) { v.pause(); v.currentTime = (startTimeRef.current + endTimeRef.current) / 2; }
          } }, 'REDRAW')
        ),
        h('div', { className:'ex-row' },
          h('div', { className:'ex-ic', style:{ background:'rgba(255,255,255,0.05)' } }, '↩'),
          h('div', { className:'ex-info' },
            h('div', { className:'ex-name' }, 'Start over'),
            h('div', { className:'ex-desc' }, 'New ball position and timing')
          ),
          h('button', { className:'ex-btn ex-outline', onClick:()=>{ resetAll(); setScreen('mark'); } }, 'RESET')
        )
      ),
      h('div', { style:{ height:16 } }),
      h('div', { className:'controls' },
        h('button', { className:'btn btn-dark', onClick:exitToUpload }, '← NEW VIDEO')
      )
    ),

    toast && h('div', { className:'toast ' + toast.type }, (toast.type === 'ok' ? '✓ ' : '✕ ') + toast.msg)
  );
}

ReactDOM.render(h(ErrBoundary, null, h(App)), document.getElementById('root'));
</script>
</body>
</html>
